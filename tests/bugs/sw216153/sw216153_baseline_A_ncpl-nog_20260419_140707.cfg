services
  ethernet-oam
    connectivity-fault-management
      maintenance-domains MD-SW216153
        level 7
        md-name string MD-SW216153
        maintenance-associations MA-SW216153
          short-ma-name string MA-SW216153
          local-mep 1
            direction down
            interface ge100-0/0/64
          !
          remote-meps
            auto-discovery disabled
            crosscheck mep-id 2
          !
        !
      !
    !
  !
  performance-monitoring
    cfm
      two-way-delay-measurement DM-SW216153-1
        admin-state enabled
        description SW-216153-no-traffic-test
        profile POP-DM-SW216153
        source maintenance-domain MD-SW216153 maintenance-association MA-SW216153 mep-id 1
        target mep-id 2
      !
    !
    profiles
      cfm
        two-way-delay-measurement POP-DM-SW216153
          inform-test-results enabled
          test-duration probes probe-count 5 probe-interval 1 repeat-interval 10
          thresholds
            delay-rtt-avg 1000
            delay-rtt-max 2000
            delay-rtt-min 100
            jitter-rtt-avg 500
            jitter-rtt-max 1000
            success-rate 90.0
          !
        !
      !
    !
  !
!

interfaces
  ge100-0/0/64
    admin-state enabled
    fec rs-fec-528-514
    l2-service enabled
  !
  ge100-0/0/70
    admin-state enabled
  !
  ipmi-ncc-0/0
    ipv4-address dhcp
  !
!

protocols
  lldp
    interface ge100-0/0/70
    !
  !
!

qos
  hw-mapping
    queue-size
      speed-ranges
        admin-state enabled
        upto 50 mbps use 50 mbps
        upto 100 mbps use 100 mbps
        upto 250 mbps use 250 mbps
        upto 500 mbps use 500 mbps
        upto 750 mbps use 750 mbps
        upto 1 gbps use 1 gbps
      !
    !
  !
!

